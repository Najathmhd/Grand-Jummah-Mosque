<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Verification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background: #f8fafc;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23064e3b' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .verification-card { 
            background: white; 
            padding: 3.5rem 2.5rem 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.12); 
            text-align: center; 
            max-width: 440px; 
            width: 90%; 
            border-top: 6px solid var(--secondary);
            border-bottom: 6px solid var(--primary);
            position: relative;
            overflow: hidden;
        }
        .verification-card::before {
            content: '۞';
            position: absolute;
            top: -25px;
            right: -15px;
            font-size: 10rem;
            color: var(--secondary);
            opacity: 0.1;
            font-family: 'Amiri', serif;
            pointer-events: none;
        }
        .status-badge { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 2.5rem; 
            background: linear-gradient(135deg, var(--success), #047857); 
            color: white; 
            border-radius: 30px; 
            font-weight: 700; 
            margin-bottom: 2.5rem; 
            box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3);
            font-size: 1.15rem;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 10;
        }
        h1 { 
            margin: 0 0 1.5rem; 
            color: var(--primary); 
            font-size: 2.2rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 1.5rem;
        }
        .stat { 
            font-size: 1.25rem; 
            margin: 1.2rem 0; 
            color: var(--text-muted); 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }
        .stat-label {
            font-weight: 600;
        }
        .val { 
            font-weight: 700; 
            color: var(--primary-dark); 
            font-size: 1.4rem;
        }
        .id-val {
            color: var(--danger);
            letter-spacing: 1px;
            font-family: 'Outfit', sans-serif;
        }
        .footer {
            margin-top: 3rem; 
            color: var(--secondary); 
            font-size: 1.1rem;
            font-family: 'Amiri', serif;
            font-weight: 700;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="verification-card">
        <div class="status-badge"><span>✓</span> Verified Member</div>
        <h1>{{ member.name }}</h1>
        
        <div class="stat">
            <span class="stat-label">Member ID</span>
            <span class="val id-val">{{ member.member_id }}</span>
        </div>
        <div class="stat">
            <span class="stat-label">Area</span>
            <span class="val">{{ member.area }}</span>
        </div>
        <div class="stat">
            <span class="stat-label">Phone</span>
            <span class="val">{{ member.phone }}</span>
        </div>
        
        <div class="footer">
            ~ Grand Jummah Mosque System ~
        </div>
    </div>
</body>
</html>
