{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Add New Member</h2>
    <form method="POST">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="e.g. Mohamed Riyaz">
        
        <label>Phone Number</label>
        <input type="text" name="phone" required placeholder="e.g. 077XXXXXXX">
        
        <label>Area</label>
        <select name="area" required>
            <option value="Masjid Mawatha">Masjid Mawatha</option>
            <option value="Pilanduwa">Pilanduwa</option>
            <option value="Town">Town</option>
        </select>
        
        <button type="submit" class="btn btn-large" style="margin-top: 1rem;">Register Member</button>
    </form>
</div>

<div class="card">
    <h2>Registered Members</h2>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Area</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for m in members %}
                <tr>
                    <td><strong>{{ m.member_id }}</strong></td>
                    <td>{{ m.name }}</td>
                    <td>{{ m.area }}</td>
                    <td>{{ m.phone }}</td>
                    <td>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <img src="{{ url_for('serve_qr', member_id=m.member_id) }}" alt="QR" style="height: 40px; border: 1px solid #ddd;">
                            <a href="{{ url_for('member_card', member_id=m.member_id) }}" target="_blank" class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Card</a>
                            <a href="{{ url_for('edit_member', id=m.id) }}" class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; background: #d4af37; color: white;">Edit</a>
                            <form method="POST" action="{{ url_for('delete_member', id=m.id) }}" style="margin:0;" onsubmit="return confirm('Are you sure you want to delete this member? All their recorded distribution history will be fully lost.');">
                                <button type="submit" class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; border: none; cursor: pointer;">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
